                difficulty: "⭐⭐",
                prescription: ["アイリーア硝子体注射（予定）", "ガチフロ点眼液（術前・術後用）"],
                so_info: {
                    s: "「目に注射をするなんて怖い。その前の目薬（抗菌薬）はそんなに大事なの？」",
                    o: "黄斑浮腫に対する抗VEGF薬投与予定。"
                },
                question: "眼内注射や手術の前後に抗菌点眼薬を使用する最大の目的は？",
                options: ["痛みを和らげるため", "眼内炎（目の中の感染症）という重篤な合併症を防ぐため", "視力を一時的に上げるため"],
                answerIndex: 1,
                soap_example: {
                    a: "眼内注射は微細ながら眼球に針を通すため、表面の菌が中に入ると失明に直結する「眼内炎」を起こすリスクがある。",
                    p: "「術前の点眼は目の中を清潔に保ち、恐ろしい感染症から目を守るための盾である」と説明。回数と期間を厳守するよう強く指導。"
                },
                bad_end: "見逃すと… 眼内炎を発症し、急激な視力低下と組織破壊により失明するリスクがある。",
                good_end: "介入すると… 患者が治療の重要性を理解し、合併症のない安全な処置が遂行される。"
            },
        ];

        function App() {
            const [currentCaseIndex, setCurrentCaseIndex] = useState(0);
            const [step, setStep] = useState(1); // 1: 処方, 2: クイズ, 3: 結果
            const [selectedOption, setSelectedOption] = useState(null);

            const currentCase = cases[currentCaseIndex];

            // ステップを進める
            const handleNextStep = () => {
                if (step < 3) setStep(step + 1);
            };

            // 回答を選択
            const handleAnswer = (index) => {
                setSelectedOption(index);
            };

            // 次の症例へ（リセット含む）
            const resetAndGoNext = () => {
                setStep(1);
                setSelectedOption(null);
                setCurrentCaseIndex((currentCaseIndex + 1) % cases.length);
            };

            // 直接指定したインデックスに移動
            const navigateTo = (index) => {
                if (index >= 0 && index < cases.length) {
                    setStep(1);
                    setSelectedOption(null);
                    setCurrentCaseIndex(index);
                }
            };

            return (
                <div style={{display: 'flex', flexDirection: 'column', height: '100%'}}>
                    <div className="header">
                        <h1 className="header-title">Pharm-Insight</h1>
                        <div className="nav-controls">
                            <button 
                                className="nav-btn" 
                                onClick={() => navigateTo(currentCaseIndex - 1)}
                                disabled={currentCaseIndex === 0}
                            >
                                ◀ 前
                            </button>
                            <span className="progress">{currentCaseIndex + 1} / {cases.length}</span>
                            <button 
                                className="nav-btn" 
                                onClick={() => navigateTo(currentCaseIndex + 1)}
                                disabled={currentCaseIndex === cases.length - 1}
                            >
                                次 ▶
                            </button>
                        </div>
                    </div>

                    <div className="content">
                        {/* タイトル表示 */}
                        <div style={{marginBottom: '10px', fontSize: '14px', fontWeight: 'bold', color: '#34495e'}}>
                            テーマ: {currentCase.title}
                        </div>

                        {/* Step 1: 処方提示 */}
                        <div className="card">
                            <span className="label">【処方内容】難易度:{currentCase.difficulty}</span>
                            {currentCase.prescription.map((med, i) => (
                                <span key={i} className="med-text">・{med}</span>
                            ))}
                        </div>

                        {/* Step 2以降: 患者情報 */}
                        {step >= 2 && (
                            <div className="card info-card">
                                <span className="label">【患者の状態 (S/O)】</span>
                                <span className="s-text">S: {currentCase.so_info.s}</span>
                                <span className="o-text">O: {currentCase.so_info.o}</span>
                            </div>
                        )}

                        {/* Step 2: クイズ */}
                        {step === 2 && (
                            <div className="card">
                                <span className="question-text">{currentCase.question}</span>
                                {currentCase.options.map((opt, i) => (
                                    <button 
                                        key={i} 
                                        className={`option-button ${selectedOption === i ? 'selected-option' : ''}`}
                                        onClick={() => handleAnswer(i)}
                                    >
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Step 3: 結果と解説 */}
                        {step === 3 && (
                            <div>
                                <div className={`card ${selectedOption === currentCase.answerIndex ? 'correct-card' : 'wrong-card'}`}>
                                    <div className="result-title">
                                        {selectedOption === currentCase.answerIndex ? "✅ 正解！" : "❌ 不正解"}
                                    </div>
                                    <span className="label">薬学的アセスメント(A):</span>
                                    <p className="soap-text">{currentCase.soap_example.a}</p>
                                    <span className="label">介入プラン(P):</span>
                                    <p className="soap-text">{currentCase.soap_example.p}</p>
                                </div>

                                <div className="outcome-card">
                                    <span className="bad-end-title">⚠️ 見逃した場合のアウトカム</span>
                                    <p className="outcome-text">{currentCase.bad_end}</p>
                                    <span className="good-end-title">✨ 介入した場合のアウトカム</span>
                                    <p className="outcome-text">{currentCase.good_end}</p>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="footer">
                        {step < 3 ? (
                            <button 
                                className="next-button" 
                                disabled={step === 2 && selectedOption === null}
                                onClick={handleNextStep}
                            >
                                {step === 1 ? "患者の状況を確認する" : "結果を見る"}
                            </button>
                        ) : (
                            <button 
                                className="next-button" 
                                onClick={resetAndGoNext}
                                disabled={currentCaseIndex === cases.length - 1}
                            >
                                {currentCaseIndex === cases.length - 1 ? "全症例 終了" : "次の症例へ"}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
