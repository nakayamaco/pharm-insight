        function App() {
            const [currentCaseIndex, setCurrentCaseIndex] = useState(0);
            const [step, setStep] = useState(1); // 1: 処方, 2: クイズ, 3: 結果
            const [selectedOption, setSelectedOption] = useState(null);

            const currentCase = cases[currentCaseIndex];

            const handleNextStep = () => {
                if (step < 3) setStep(step + 1);
            };

            const handleAnswer = (index) => {
                setSelectedOption(index);
            };

            const resetCase = () => {
                setStep(1);
                setSelectedOption(null);
                setCurrentCaseIndex((currentCaseIndex + 1) % cases.length);
            };

            return (
                <div style={{display: 'flex', flexDirection: 'column', height: '100%'}}>
                    <div className="header">
                        <h1 className="header-title">Pharm-Insight v1.0</h1>
                        <span className="progress">症例 {currentCase.id} / 100</span>
                    </div>

                    <div className="content">
                        {/* Step 1: 処方提示 */}
                        <div className="card">
                            <span className="label">【処方内容】難易度:{currentCase.difficulty}</span>
                            {currentCase.prescription.map((med, i) => (
                                <span key={i} className="med-text">・{med}</span>
                            ))}
                        </div>

                        {/* Step 2以降: 患者情報 */}
                        {step >= 2 && (
                            <div className="card info-card">
                                <span className="label">【患者の状態 (S/O)】</span>
                                <span className="s-text">S: {currentCase.so_info.s}</span>
                                <span className="o-text">O: {currentCase.so_info.o}</span>
                            </div>
                        )}

                        {/* Step 2: クイズ */}
                        {step === 2 && (
                            <div className="card">
                                <span className="question-text">{currentCase.question}</span>
                                {currentCase.options.map((opt, i) => (
                                    <button 
                                        key={i} 
                                        className={`option-button ${selectedOption === i ? 'selected-option' : ''}`}
                                        onClick={() => handleAnswer(i)}
                                    >
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Step 3: 結果と解説 */}
                        {step === 3 && (
                            <div>
                                <div className={`card ${selectedOption === currentCase.answerIndex ? 'correct-card' : 'wrong-card'}`}>
                                    <div className="result-title">
                                        {selectedOption === currentCase.answerIndex ? "✅ 正解！" : "❌ 不正解"}
                                    </div>
                                    <span className="label">薬学的アセスメント(A):</span>
                                    <p className="soap-text">{currentCase.soap_example.a}</p>
                                    <span className="label">介入プラン(P):</span>
                                    <p className="soap-text">{currentCase.soap_example.p}</p>
                                </div>

                                <div className="outcome-card">
                                    <span className="bad-end-title">⚠️ 見逃した場合のアウトカム</span>
                                    <p className="outcome-text">{currentCase.bad_end}</p>
                                    <span className="good-end-title">✨ 介入した場合のアウトカム</span>
                                    <p className="outcome-text">{currentCase.good_end}</p>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="footer">
                        {step < 3 ? (
                            <button 
                                className="next-button" 
                                disabled={step === 2 && selectedOption === null}
                                onClick={handleNextStep}
                            >
                                {step === 1 ? "状況を確認する" : "結果を見る"}
                            </button>
                        ) : (
                            <button className="next-button" onClick={resetCase}>
                                次の症例へ
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
